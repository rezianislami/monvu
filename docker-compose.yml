services:
  db:
    image: postgres:17-alpine
    container_name: tabungankita-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tabungankita
      POSTGRES_PASSWORD: tabungankita
      POSTGRES_DB: tabungankita
    ports:
      - "5433:5432" # custom host port to avoid clashing with a local 5432
    volumes:
      - tabungankita_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabungankita -d tabungankita"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tabungankita_pgdata:
